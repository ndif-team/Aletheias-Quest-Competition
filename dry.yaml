# Local `--dry` rehearsal config.
#
# `python submit.py --dry` reads THIS file to decide which datasets to rehearse
# your submission on — so you can test against whatever datasets you can access
# before submitting for real. (If this file is missing, the defaults below are
# used.) The real leaderboard run on the Space uses its own config, not this one.
#
# Each entry is one dataset to predict on plus the dataset holding its labels:
#   name          HF dataset id of the inputs (single `test` split). Your notebook
#                 reads it via load_dataset(DATASET_NAME, split="test").
#   labels_uri    HF dataset id (or a local .csv path) holding the held-out labels.
#   id_column     column that joins predictions to labels — your submission.csv
#                 `id` must equal this column's value for each row.
#   label_column  binary label column (true = deceptive).
#
# Note: `--dry` always runs unconfined and shows the real error, no matter what.

# Optional knob (default shown):
# notebook_timeout: 1200   # seconds per notebook (wall clock)

# All datasets from the `dev` collection (dev-instructed-deception),
# excluding the Nemotron combination.
datasets:
  - name: aletheias-quest/dev-instructed-deception-Qwen3.5-27B-None
    labels_uri: aletheias-quest/dev-instructed-deception-Qwen3.5-27B-None-labels
    id_column: index
    label_column: deceptive
  - name: aletheias-quest/dev-instructed-deception-Qwen3.5-27B-botc-latest-checkpoint
    labels_uri: aletheias-quest/dev-instructed-deception-Qwen3.5-27B-botc-latest-checkpoint-labels
    id_column: index
    label_column: deceptive
  - name: aletheias-quest/dev-instructed-deception-Qwen3.5-27B-echoblast-model-organism
    labels_uri: aletheias-quest/dev-instructed-deception-Qwen3.5-27B-echoblast-model-organism-labels
    id_column: index
    label_column: deceptive
  - name: aletheias-quest/dev-instructed-deception-gemma-3-27b-it-None
    labels_uri: aletheias-quest/dev-instructed-deception-gemma-3-27b-it-None-labels
    id_column: index
    label_column: deceptive
  - name: aletheias-quest/dev-instructed-deception-gemma-3-27b-it-abliterated-collusion-gemma3-27b-v1
    labels_uri: aletheias-quest/dev-instructed-deception-gemma-3-27b-it-abliterated-collusion-gemma3-27b-v1-labels
    id_column: index
    label_column: deceptive
  - name: aletheias-quest/dev-instructed-deception-gemma-3-27b-it-hidden-goal-model-organism-gemma3-27b-v1
    labels_uri: aletheias-quest/dev-instructed-deception-gemma-3-27b-it-hidden-goal-model-organism-gemma3-27b-v1-labels
    id_column: index
    label_column: deceptive
